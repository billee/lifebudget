name: lifebudget
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.0.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Animations
  lottie: ^3.1.0

  # UI Helpers
  flutter_svg: ^2.0.10
  fl_chart: ^0.68.0          # For spending charts
  percent_indicator: ^4.2.3  # For jar progress bars

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utils
  intl: ^0.19.0              # Currency & date formatting
  uuid: ^4.4.0               # Unique IDs for records